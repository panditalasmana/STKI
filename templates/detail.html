<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>{{ product.nama }}</title>

    <!-- BOOTSTRAP -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- AOS ANIMATION -->

    <link
        href="https://unpkg.com/aos@2.3.1/dist/aos.css"
        rel="stylesheet"
    />

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            LaptopFinder
        </a>

    </div>

</nav>

<!-- DETAIL SECTION -->

<section class="detail-section">

    <div class="container">

        <!-- BACK BUTTON -->

        <a
            href="/"
            class="back-btn mb-5"
        >
            ← Back to Home
        </a>

        <div class="row align-items-center">

            <!-- IMAGE -->

            <div
                class="col-lg-6 mb-5 mb-lg-0"
                data-aos="fade-right"
            >

                <img
                    src="{{ url_for('static', filename='images/detail.jpg') }}"
                    class="detail-image"
                >

            </div>

            <!-- CONTENT -->

            <div
                class="col-lg-6"
                data-aos="fade-left"
            >

                <!-- BADGE -->

                <span class="badge-type">
                    Laptop Product
                </span>

                <!-- TITLE -->

                <h1 class="detail-title mt-4">

                    {{ product.nama }}

                </h1>

                <!-- PRICE -->

                <h2 class="detail-price">

                    {{ product.harga }}

                </h2>

                <!-- SPECS -->

                <div class="spec-box">

                    <span>Gaming</span>

                    <span>RTX Series</span>

                    <span>SSD Storage</span>

                </div>

                <!-- DESCRIPTION -->

                <p class="detail-description">

                    {{ product.deskripsi }}

                </p>

                <!-- BUTTON -->

                <div class="mt-4">

                    <a
                        href="#"
                        class="buy-btn"
                    >
                        Buy Now
                    </a>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- AOS JS -->

<script
    src="https://unpkg.com/aos@2.3.1/dist/aos.js">
</script>

<script>

    AOS.init({

        duration: 1200,

        once: true

    });

</script>

</body>

</html>
